<!DOCTYPE html>
<html>
<!-- Bu bir yorum satırıdır -->

<!-- Tag lar açıldıklarında kapatılmalıdır - ihtimaller vardır -->

<!-- head tag ı sayfanın ne olduğu, kim trafından yazıldığı, 
    hangi anahtar kelimelerin yoğun olduğu vb.
    Önemli : bu tag da yazılanları kullanıcı görmez. -->
<head>
    <meta charset="utf-8" />
    <title>11C Sınıfı Harika Gibi Duruyor</title>   <!-- Sekme başlığıdır. -->
</head>

<!-- body kullanıcıya görünen bütün kısım. Resim, yazı vb. -->
<body>
    <!-- paragraf tagı : metinler için kullanılır -->

    <!-- paragraf -->
    <p>Merhaba Dünya</p>
    <p>Merhaba VENÜS</p>

    <!-- bold / Kalın -->
    <b>Merhaba Jüpiter</b>  <br />

    <!-- italik / eğik -->
    <i>Merhaba Satürn</i>   <br />

    <!-- altı çizili -->
    <u>Merhaba 11C</u>

    <!-- br alt satıra geçirir -->

    <!-- h1 en büyük başlık. Sayı büyüdükçe boyut küçülüyor. -->
    <h1>Merhaba başlık</h1>
    <h2>Merhaba başlık</h2>
    <h3>Merhaba başlık</h3>
    <h4>Merhaba başlık</h4>
    <h5>Merhaba başlık</h5>
    <h6>Merhaba başlık</h6>

    <!-- NESTED / iç içe yapı -->
    <i><u><b>hello</b></u></i>

</body>
</html>
